resources:
  pipelines:
    bronze:
      name: ${var.pipeline_label}
      serverless: true
      catalog: ${var.catalog}
      schema: ${var.schema}
      continuous: false
      development: true
      channel: current
      root_path: ../src/pipelines/bronze
      libraries:
        - glob:
            include: ../src/pipelines/bronze/transformations/**
      configuration:
        bronze.catalog: ${var.catalog}
        bronze.schema: ${var.schema}
        bronze.volume: ${var.volume}
        bronze.repo_root: ${var.repo_root}
        bronze.pipeline_label: ${var.pipeline_label}
